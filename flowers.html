<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            animation: fadeInScale 1s ease-out;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .name {
            font-size: clamp(1.8rem, 4vw, 3rem);
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .message {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #fff;
            line-height: 1.8;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
            font-weight: 600;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            color: #ff69b4;
            animation: floatUp linear infinite;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
            filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.5));
        }

        .moon {
            position: fixed;
            top: 10%;
            right: 10%;
            width: 100px;
            height: 100px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8),
                        0 0 60px rgba(255, 215, 0, 0.6),
                        inset -10px -10px 20px rgba(0, 0, 0, 0.1);
            animation: moonGlow 3s ease-in-out infinite alternate;
            z-index: 5;
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s ease-in-out infinite;
        }

        .interactive-heart {
            display: inline-block;
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .interactive-heart:hover {
            transform: scale(1.3) rotate(15deg);
            filter: drop-shadow(0 0 20px #ff1493);
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes glow {
            0% {
                text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3),
                             0 0 20px rgba(255, 255, 255, 0.5);
            }
            100% {
                text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3),
                             0 0 40px rgba(255, 255, 255, 0.9),
                             0 0 60px rgba(255, 255, 255, 0.6);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) rotate(360deg);
            }
        }

        @keyframes moonGlow {
            0% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.8),
                            0 0 60px rgba(255, 215, 0, 0.6),
                            inset -10px -10px 20px rgba(0, 0, 0, 0.1);
            }
            100% {
                box-shadow: 0 0 60px rgba(255, 215, 0, 1),
                            0 0 100px rgba(255, 215, 0, 0.8),
                            inset -10px -10px 20px rgba(0, 0, 0, 0.1);
            }
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            10%, 30% {
                transform: scale(1.1);
            }
            20%, 40% {
                transform: scale(1);
            }
        }

        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnimation 1s ease-out forwards;
        }

        @keyframes sparkleAnimation {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            .moon {
                width: 60px;
                height: 60px;
                top: 5%;
                right: 5%;
            }
        }
    </style>
</head>
<body>
    <div class="moon"></div>
    
    <div class="stars" id="stars"></div>
    
    <div class="heart-container" id="heartContainer"></div>
    
    <div class="container">
        <h1>Happy Valentine's Day! 💕</h1>
        <div class="name">Həbibə Qurbanova</div>
        <div class="message">
            I love you to the moon and back,<br>
            my forever valentine. ✨
        </div>
        <div>
            <span class="interactive-heart" onclick="createExplosion(this)">❤️</span>
            <span class="interactive-heart" onclick="createExplosion(this)">💖</span>
            <span class="interactive-heart" onclick="createExplosion(this)">💝</span>
        </div>
    </div>

    <script>
        // Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💝', '💘'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
            heart.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('heartContainer').appendChild(heart);
            
            setTimeout(() => heart.remove(), 15000);
        }

        setInterval(createHeart, 500);

        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // Interactive heart explosion
        function createExplosion(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = centerX + 'px';
                sparkle.style.top = centerY + 'px';
                
                const angle = (Math.PI * 2 * i) / 15;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                sparkle.style.setProperty('--tx', tx + 'px');
                sparkle.style.setProperty('--ty', ty + 'px');
                sparkle.style.background = ['#ff69b4', '#ff1493', '#ffd700', '#fff'][Math.floor(Math.random() * 4)];
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // Mouse trail effect
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.3) {
                const trail = document.createElement('div');
                trail.style.position = 'fixed';
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
                trail.style.width = '8px';
                trail.style.height = '8px';
                trail.style.background = 'rgba(255, 255, 255, 0.8)';
                trail.style.borderRadius = '50%';
                trail.style.pointerEvents = 'none';
                trail.style.boxShadow = '0 0 10px rgba(255, 255, 255, 0.8)';
                trail.style.animation = 'sparkleAnimation 0.8s ease-out forwards';
                trail.style.setProperty('--tx', (Math.random() - 0.5) * 40 + 'px');
                trail.style.setProperty('--ty', (Math.random() - 0.5) * 40 + 'px');
                trail.style.zIndex = '1000';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 800);
            }
        });
    </script>
</body>
</html>
